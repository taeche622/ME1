<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시험 문제 & 정답 뷰어</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; hight: 100vh; height: 100vh; overflow: hidden; }

        /* 상단 네비게이션 및 정답 영역 */
        header { background: #2c3e50; color: white; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 10; }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
        select, button { padding: 8px 12px; font-size: 14px; border-radius: 4px; border: none; cursor: pointer; }
        select { background: white; color: #333; }
        
        .btn-num { background: #34495e; color: white; transition: all 0.2s; }
        .btn-num:hover { background: #3498db; }
        .btn-num.active { background: #e74c3c; font-weight: bold; }

        /* 정답 표시 바 */
        .answer-box { background: #ecf0f1; color: #2c3e50; padding: 10px 15px; border-radius: 4px; font-size: 16px; font-weight: bold; border-left: 5px solid #e74c3c; min-height: 44px; display: flex; align-items: center; }

        /* 메인 컨텐츠 영역 */
        .main-container { display: flex; flex: 1; overflow: hidden; background: #eee; }
        
        /* PDF 뷰어 영역 (스크롤 가능) */
        #pdf-viewer-container { flex: 1; overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 20px; position: relative; }
        #pdf-canvas { background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
    </style>
</head>
<body>

    <header>
        <div class="controls">
            <select id="select-year">
                <option value="2025">2025년</option>
                <option value="2026">2026년</option>
            </select>
            <select id="select-month">
                <option value="03">3월</option>
                <option value="09">9월</option>
            </select>
            <div id="button-group-numbers">
                </div>
        </div>
        <div class="answer-box" id="answer-display">
            문제를 선택하면 정답이 이곳에 표시됩니다.
        </div>
    </header>

    <div class="main-container">
        <div id="pdf-viewer-container">
            <canvas id="pdf-canvas"></canvas>
        </div>
    </div>

    <script>
        // PDF.js 워커 경로 설정 (필수)
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // 1. 문제별 데이터 설정 (년도-월-번호 데이터베이스)
        // page: PDF 내의 페이지 번호
        // targetY: 페이지 상단에서부터 이동할 세로 좌표 비율 (0 ~ 1)
        // scale: 확대 비율 (1.5 ~ 2.5 추천)
        // answer: 상단에 보여줄 정답 문구
        const examData = {
            "2026-03": {
                1: { page: 1, targetY: 0.1, scale: 2.0, answer: "정답: ①" },
                2: { page: 1, targetY: 0.5, scale: 2.0, answer: "정답: ④" },
                3: { page: 2, targetY: 0.1, scale: 1.8, answer: "정답: ⑤ (오답률 65%)" },
                4: { page: 2, targetY: 0.6, scale: 2.2, answer: "정답: ③" }
            },
            "2026-06": {
                1: { page: 1, targetY: 0.1, scale: 2.0, answer: "정답: ②" },
                2: { page: 1, targetY: 0.55, scale: 2.0, answer: "정답: ③" }
            }
        };

        // 전역 상태 변수
        let currentPdf = null;
        let currentRenderTask = null;

        // DOM 엘리먼트 추출
        const selectYear = document.getElementById('select-year');
        const selectMonth = document.getElementById('select-month');
        const btnGroupNumbers = document.getElementById('button-group-numbers');
        const answerDisplay = document.getElementById('answer-display');
        const viewerContainer = document.getElementById('pdf-viewer-container');
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');

        // 2. 초기화 및 이벤트 리스너 설정
        window.addEventListener('DOMContentLoaded', () => {
            updateQuestionButtons(); // 첫 실행 시 버튼 생성
            
            selectYear.addEventListener('change', updateQuestionButtons);
            selectMonth.addEventListener('change', updateQuestionButtons);
        });

        // 3. 선택된 년도/월에 따라 문제 번호 버튼 동적 생성
        function updateQuestionButtons() {
            const key = `${selectYear.value}-${selectMonth.value}`;
            btnGroupNumbers.innerHTML = ''; // 기존 버튼 제거
            
            const currentQuestions = examData[key];
            
            if (!currentQuestions) {
                answerDisplay.innerText = "해당 날짜의 문제 데이터가 존재하지 않습니다.";
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }

            // 등록된 문제 번호만큼 버튼 생성
            Object.keys(currentQuestions).forEach(num => {
                const btn = document.createElement('button');
                btn.className = 'btn-num';
                btn.innerText = `${num}번`;
                btn.onclick = () => loadAndFocusQuestion(key, num, btn);
                btnGroupNumbers.appendChild(btn);
            });

            // 첫 데이터 초기화 안내
            answerDisplay.innerText = `${selectYear.value}년 ${selectMonth.value}월 문제지를 불러올 준비가 되었습니다. 번호를 선택하세요.`;
        }

        // 4. 핵심 기능: PDF 로드, 특정 페이지 렌더링, 특정 위치 스크롤 포커싱
        async function loadAndFocusQuestion(dateKey, qNum, activeBtn) {
            // 버튼 활성화 스타일 변경
            document.querySelectorAll('.btn-num').forEach(b => b.classList.remove('active'));
            activeBtn.classList.add('active');

            const qInfo = examData[dateKey][qNum];
            if (!qInfo) return;

            // 상단 바에 정답 표기
            answerDisplay.innerHTML = `<strong>[${qNum}번 정답]</strong> &nbsp; ${qInfo.answer}`;

            // PDF 파일 경로 설정 (예: pdfs/2026_03.pdf)
            const pdfUrl = `pdfs/${dateKey.replace('-', '_')}.pdf`;

            try {
                // 기존 렌더링 작업이 진행 중이라면 취소 처리 (렉 방지)
                if (currentRenderTask) {
                    currentRenderTask.cancel();
                }

                // PDF 파일이 새로 바뀔 때만 네트워크에서 로드
                if (!currentPdf || currentPdf._transport.filename !== pdfUrl) {
                    answerDisplay.innerText = "PDF 문서를 불러오는 중입니다...";
                    currentPdf = await pdfjsLib.getDocument(pdfUrl).promise;
                }

                // 지정된 페이지 가져오기
                const page = await currentPdf.getPage(qInfo.page);
                
                // 지정된 비율(scale)로 뷰포트 설정
                const viewport = page.getViewport({ scale: qInfo.scale });
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                // 캔버스에 PDF 페이지 그리기
                const renderContext = { canvasContext: ctx, viewport: viewport };
                currentRenderTask = page.render(renderContext);
                await currentRenderTask.promise;

                // 렌더링 완료 후 스크롤 좌표 조절 (원하는 위치 확대 포커싱)
                // targetY 비율을 기반으로 해당 픽셀 위치 계산 후 스크롤 이동
                const scrollTargetY = canvas.offsetTop + (viewport.height * qInfo.targetY) - 50;
                
                viewerContainer.scrollTo({
                    top: scrollTargetY,
                    behavior: 'smooth' // 부드럽게 스크롤 이동
                });

            } catch (error) {
                console.error(error);
                answerDisplay.innerText = `에러 발생: PDF 파일을 찾을 수 없거나 불러오지 못했습니다. 경로(${pdfUrl})를 확인해 주세요.`;
            }
        }
    </script>
</body>
</html>
