<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시험 문제 & 정답 뷰어</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* 상단 네비게이션 및 정답 영역 */
        header { background: #2c3e50; color: white; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 10; }
        
        /* 행별 레이아웃 구분을 위한 스타일 */
        .control-row { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; flex-wrap: wrap; }
        .row-title { font-size: 14px; font-weight: bold; color: #bdc3c7; min-width: 50px; }
        .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }

        /* 공통 버튼 스타일 */
        button { padding: 6px 12px; font-size: 14px; border-radius: 4px; border: none; cursor: pointer; transition: all 0.2s; }
        
        /* 그룹별 버튼 색상 구분 */
        .btn-year { background: #34495e; color: white; }
        .btn-year:hover { background: #1abc9c; }
        .btn-year.active { background: #1abc9c; font-weight: bold; }

        .btn-month { background: #34495e; color: white; }
        .btn-month:hover { background: #9b59b6; }
        .btn-month.active { background: #9b59b6; font-weight: bold; }

        .btn-num { background: #7f8c8d; color: white; }
        .btn-num:hover { background: #e74c3c; }
        .btn-num.active { background: #e74c3c; font-weight: bold; }

        /* 정답 표시 바 */
        .answer-box { background: #ecf0f1; color: #2c3e50; padding: 10px 15px; border-radius: 4px; font-size: 16px; font-weight: bold; border-left: 5px solid #e74c3c; min-height: 44px; display: flex; align-items: center; margin-top: 5px; }

        /* 메인 컨텐츠 영역 */
        .main-container { display: flex; flex: 1; overflow: hidden; background: #eee; }
        
        /* PDF 뷰어 영역 (스크롤 가능) */
        #pdf-viewer-container { flex: 1; overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 20px; position: relative; }
        #pdf-canvas { background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
    </style>
</head>
<body>

    <header>
        <div class="control-row">
            <span class="row-title">연도</span>
            <div id="group-year" class="btn-group">
                </div>
        </div>

        <div class="control-row">
            <span class="row-title">월</span>
            <div id="group-month" class="btn-group">
                </div>
        </div>

        <div class="control-row">
            <span class="row-title">번호</span>
            <div id="group-number" class="btn-group">
                </div>
        </div>

        <div class="answer-box" id="answer-display">
            연도와 월을 선택한 후, 문제 번호를 클릭하면 정답이 표시됩니다.
        </div>
    </header>

    <div class="main-container">
        <div id="pdf-viewer-container">
            <canvas id="pdf-canvas"></canvas>
        </div>
    </div>

    <script>
        // PDF.js 워커 경로 설정
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // 데이터 생성용 기본 옵션 배열
        const years = ["2017", "2018", "2019", "2020", "2021", "2022", "2023", "2024", "2025", "2026"];
        const months = ["03", "04", "06", "07", "09", "10", "11"];

        // [데이터베이스 설정] 필요한 연도-월 조합의 문제 데이터들을 여기에 채워 넣으시면 됩니다.
        const examData = {
            "2017-03": {
                1: { page: 1, targetY: 0.1, scale: 2.0, answer: "정답: ③" },
                2: { page: 1, targetY: 0.5, scale: 2.0, answer: "정답: ①" }
            },
            "2025-09": {
                1: { page: 1, targetY: 0.1, scale: 2.0, answer: "정답: ①" },
                2: { page: 1, targetY: 0.5, scale: 2.0, answer: "정답: ④" },
                3: { page: 2, targetY: 0.1, scale: 1.8, answer: "정답: ⑤" },
                4: { page: 2, targetY: 0.6, scale: 2.2, answer: "정답: ③" }
            }
        };

        // 선택 상태 저장 변수
        let selectedYear = "2026"; // 기본 초기값
        let selectedMonth = "03"; // 기본 초기값
        let currentPdf = null;
        let currentRenderTask = null;

        // DOM 추출
        const groupYear = document.getElementById('group-year');
        const groupMonth = document.getElementById('group-month');
        const groupNumber = document.getElementById('group-number');
        const answerDisplay = document.getElementById('answer-display');
        const viewerContainer = document.getElementById('pdf-viewer-container');
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');

        // 실행 시 초기 버튼 생성
        window.addEventListener('DOMContentLoaded', () => {
            initYearButtons();
            initMonthButtons();
            updateQuestionButtons();
        });

        // 1. 연도 버튼들 동적 생성
        function initYearButtons() {
            years.forEach(year => {
                const btn = document.createElement('button');
                btn.className = 'btn-year';
                if(year === selectedYear) btn.classList.add('active');
                btn.innerText = `${year}년`;
                
                btn.onclick = () => {
                    document.querySelectorAll('.btn-year').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedYear = year;
                    updateQuestionButtons();
                };
                groupYear.appendChild(btn);
            });
        }

        // 2. 월 버튼들 동적 생성
        function initMonthButtons() {
            months.forEach(month => {
                const btn = document.createElement('button');
                btn.className = 'btn-month';
                if(month === selectedMonth) btn.classList.add('active');
                btn.innerText = `${parseInt(month)}월`; // '03월'을 '3월'로 표기
                
                btn.onclick = () => {
                    document.querySelectorAll('.btn-month').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedMonth = month;
                    updateQuestionButtons();
                };
                groupMonth.appendChild(btn);
            });
        }

        // 3. 연도-월 조합 변경에 따른 문제 번호 버튼 갱신
        function updateQuestionButtons() {
            const key = `${selectedYear}-${selectedMonth}`;
            groupNumber.innerHTML = ''; // 기존 번호 버튼 초기화
            
            const currentQuestions = examData[key];
            
            if (!currentQuestions) {
                answerDisplay.innerText = `${selectedYear}년 ${parseInt(selectedMonth)}월의 문제 데이터가 등록되지 않았습니다.`;
                ctx.clearRect(0, 0, canvas.width, canvas.height); // 화면 지우기
                return;
            }

            // 존재하는 번호만큼 단추 생성
            Object.keys(currentQuestions).forEach(num => {
                const btn = document.createElement('button');
                btn.className = 'btn-num';
                btn.innerText = `${num}번`;
                btn.onclick = () => loadAndFocusQuestion(key, num, btn);
                groupNumber.appendChild(btn);
            });

            answerDisplay.innerText = `${selectedYear}년 ${parseInt(selectedMonth)}월 문제지가 준비되었습니다. 풀이할 번호 버튼을 누르세요.`;
        }

        // 4. PDF 로드 및 특정 스크롤 영역 포커싱
        async function loadAndFocusQuestion(dateKey, qNum, activeBtn) {
            document.querySelectorAll('.btn-num').forEach(b => b.classList.remove('active'));
            activeBtn.classList.add('active');

            const qInfo = examData[dateKey][qNum];
            if (!qInfo) return;

            // 상단 정답 영역 업데이트
            answerDisplay.innerHTML = `<strong>[${selectedYear}년 ${parseInt(selectedMonth)}월 ${qNum}번]</strong> &nbsp;&nbsp; ${qInfo.answer}`;

            // PDF 파일명 빌드 (예: pdfs/2026_03.pdf)
            const pdfUrl = `pdfs/${dateKey.replace('-', '_')}.pdf`;

            try {
                if (currentRenderTask) {
                    currentRenderTask.cancel();
                }

                if (!currentPdf || currentPdf._transport.filename !== pdfUrl) {
                    answerDisplay.innerText = "PDF 파일을 서버에서 불러오는 중...";
                    currentPdf = await pdfjsLib.getDocument(pdfUrl).promise;
                }

                const page = await currentPdf.getPage(qInfo.page);
                const viewport = page.getViewport({ scale: qInfo.scale });
                
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = { canvasContext: ctx, viewport: viewport };
                currentRenderTask = page.render(renderContext);
                await currentRenderTask.promise;

                // 타겟 Y좌표로 스크롤 이동 정렬
                const scrollTargetY = canvas.offsetTop + (viewport.height * qInfo.targetY) - 40;
                viewerContainer.scrollTo({
                    top: scrollTargetY,
                    behavior: 'smooth'
                });

            } catch (error) {
                console.error(error);
                answerDisplay.innerText = `오류: PDF 파일을 찾을 수 없습니다. [${pdfUrl}] 경로를 확인해 주세요.`;
            }
        }
    </script>
</body>
</html>
