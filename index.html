<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시험 문제 & 정답</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nanum Gothic', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #eee; }

        /* 상단 고정 헤더 영역 */
        header { background: #2c3e50; color: white; padding: 12px 15px; box-shadow: 0 3px 6px rgba(0,0,0,0.15); z-index: 10; display: flex; flex-direction: column; gap: 8px; }
        
        .control-row { display: flex; align-items: center; gap: 12px; margin-bottom: 2px; width: 100%; }
        .row-title { font-size: 13px; font-weight: bold; color: #bdc3c7; min-width: 45px; }
        .btn-group { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; align-items: center; }

        /* 버튼 기본 공통 스타일 */
        button { padding: 5px 10px; font-size: 13px; border-radius: 4px; border: none; cursor: pointer; transition: all 0.15s; user-select: none; }
        
        /* 카테고리별 색상 */
        .btn-year { background: #34495e; color: white; }
        .btn-year:hover, .btn-year.active { background: #1abc9c; font-weight: bold; }

        .btn-month { background: #34495e; color: white; }
        .btn-month:hover, .btn-month.active { background: #9b59b6; font-weight: bold; }

        .btn-num { background: #7f8c8d; color: white; min-width: 38px; }
        .btn-num:hover, .btn-num.active { background: #e74c3c; font-weight: bold; }

        /* 정답 및 PDF 제어 통합 레이아웃 바 */
        .info-and-pdf-control-bar { display: flex; justify-content: space-between; align-items: center; background: #ecf0f1; color: #2c3e50; padding: 8px 12px; border-radius: 4px; border-left: 5px solid #e74c3c; min-height: 40px; margin-top: 6px; flex-wrap: wrap; gap: 10px; }
        .answer-text { font-size: 15px; font-weight: bold; flex: 1; min-width: 180px; }
        
        /* 상단으로 완전 이관된 PDF 미니 컨트롤러 (기본 숨김 처리 후 JS 제어) */
        .top-pdf-controls { display: none; align-items: center; gap: 8px; background: #34495e; padding: 4px 10px; border-radius: 20px; color: white; }
        .top-pdf-controls button { background: #2c3e50; color: white; border-radius: 50%; width: 26px; height: 26px; padding: 0; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .top-pdf-controls button:hover { background: #3498db; }
        .top-pdf-controls button:disabled { background: #95a5a6; opacity: 0.4; cursor: not-allowed; }
        .top-info-text { font-size: 12px; font-weight: bold; min-width: 50px; text-align: center; }

        /* 메인 컨텐츠 영역 */
        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        #pdf-viewer-container { flex: 1; overflow: auto; display: block; padding: 15px; position: relative; }
        #pdf-canvas { background: white; box-shadow: 0 3px 8px rgba(0,0,0,0.15); display: block; margin: 0 auto; }
    </style>
</head>
<body>

    <header>
        <div class="control-row">
            <span class="row-title">연도</span>
            <div id="group-year" class="btn-group"></div>
        </div>

        <div class="control-row">
            <span class="row-title">월</span>
            <div id="group-month" class="btn-group"></div>
        </div>

        <div class="control-row">
            <span class="row-title">번호</span>
            <div id="group-number" class="btn-group"></div>
        </div>

        <div class="info-and-pdf-control-bar">
            <div class="answer-text" id="answer-display">
                연도와 월을 선택한 후 문제 번호를 누르면 정답과 제어 창이 나타납니다.
            </div>

            <div class="top-pdf-controls" id="top-controls-wrapper">
                <button id="btn-prev-page" title="이전 페이지">◀</button>
                <span class="top-info-text"><span id="current-page-num">1</span>/<span id="total-pages-num">1</span></span>
                <button id="btn-next-page" title="다음 페이지">▶</button>
                
                <span style="color:#7f8c8d; padding: 0 2px;">|</span>
                
                <button id="btn-zoom-out" title="축소">−</button>
                <span class="top-info-text" id="zoom-percent">200%</span>
                <button id="btn-zoom-in" title="확대">+</button>
            </div>
        </div>
    </header>

        let selectedYear = "2026";

        let currentPdf = null;
        let currentRenderTask = null;
        
        let pdfPageNum = 1;      
        let pdfScale = 2.0;       

        const groupYear = document.getElementById('group-year');
        const groupMonth = document.getElementById('group-month');
        const groupNumber = document.getElementById('group-number');
        const answerDisplay = document.getElementById('answer-display');
        const viewerContainer = document.getElementById('pdf-viewer-container');
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        
        const controlsWrapper = document.getElementById('top-controls-wrapper');
        const currentPageNumText = document.getElementById('current-page-num');
        const totalPagesNumText = document.getElementById('total-pages-num');
        const zoomPercentText = document.getElementById('zoom-percent');

        window.addEventListener('DOMContentLoaded', () => {
            initYearButtons();
            initMonthButtons();
            initManualControls(); 
            updateQuestionButtons();
        });

        function initYearButtons() {
            years.forEach(year => {
                const btn = document.createElement('button');
                btn.className = 'btn-year';
                if(year === selectedYear) btn.classList.add('active');
                btn.innerText = `${year}년`;
                btn.onclick = () => {
                    document.querySelectorAll('.btn-year').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedYear = year;
                    updateQuestionButtons();
                };
                groupYear.appendChild(btn);
            });
        }

        function initMonthButtons() {
            months.forEach(month => {
                const btn = document.createElement('button');
                btn.className = 'btn-month';
                if(month === selectedMonth) btn.classList.add('active');
                btn.innerText = `${parseInt(month)}월`;
                btn.onclick = () => {
                    document.querySelectorAll('.btn-month').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedMonth = month;
                    updateQuestionButtons();
                };
                groupMonth.appendChild(btn);
            });
        }

        function updateQuestionButtons() {
            const key = `${selectedYear}-${selectedMonth}`;
            groupNumber.innerHTML = '';
            
            if (controlsWrapper) controlsWrapper.style.display = 'none'; 
            
            const currentQuestions = examData[key];
            if (!currentQuestions) {
                answerDisplay.innerText = `${selectedYear}년 ${parseInt(selectedMonth)}월의 문제 데이터가 등록되지 않았습니다.`;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }

            Object.keys(currentQuestions).forEach(num => {
                const btn = document.createElement('button');
                btn.className = 'btn-num';
                btn.innerText = num; 
                btn.onclick = () => loadAndFocusQuestion(key, num, btn);
                groupNumber.appendChild(btn);
            });

            answerDisplay.innerText = `${selectedYear}년 ${parseInt(selectedMonth)}월 문제지 준비 완료. 번호를 누르세요.`;
        }

        async function loadAndFocusQuestion(dateKey, qNum, activeBtn) {
            document.querySelectorAll('.btn-num').forEach(b => b.classList.remove('active'));
            activeBtn.classList.add('active');

            const qInfo = examData[dateKey][qNum];
            if (!qInfo) return;

            answerDisplay.innerHTML = `<strong>[${selectedYear}-${parseInt(selectedMonth)}월 ${qNum}번]</strong> &nbsp; ${qInfo.answer}`;
            const pdfUrl = `pdfs/${dateKey.replace('-', '_')}.pdf`;

            try {
                if (currentRenderTask) currentRenderTask.cancel();

                if (!currentPdf || currentPdf._transport.filename !== pdfUrl) {
                    currentPdf = await pdfjsLib.getDocument(pdfUrl).promise;
                }

                pdfPageNum = qInfo.page;
                pdfScale = qInfo.scale;

                await renderPdfPage();
                if (controlsWrapper) controlsWrapper.style.display = 'flex'; 

                const scrollTargetX = canvas.offsetLeft + (canvas.width * (qInfo.targetX || 0)) - 10;
                const scrollTargetY = canvas.offsetTop + (canvas.height * (qInfo.targetY || 0)) - 30;
                
                viewerContainer.scrollTo({ left: scrollTargetX, top: scrollTargetY, behavior: 'smooth' });

            } catch (error) {
                console.error(error);
                answerDisplay.innerText = `오류: PDF 파일을 찾을 수 없습니다. 경로를 확인해 주세요.`;
            }
        }

        async function renderPdfPage() {
            if (!currentPdf) return;
            try {
                if (currentRenderTask) currentRenderTask.cancel();

                const page = await currentPdf.getPage(pdfPageNum);
                const viewport = page.getViewport({ scale: pdfScale });
                
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = { canvasContext: ctx, viewport: viewport };
                currentRenderTask = page.render(renderContext);
                await currentRenderTask.promise;

                currentPageNumText.innerText = pdfPageNum;
                totalPagesNumText.innerText = currentPdf.numPages;
                zoomPercentText.innerText = `${Math.round(pdfScale * 100)}%`;

                document.getElementById('btn-prev-page').disabled = (pdfPageNum <= 1);
                document.getElementById('btn-next-page').disabled = (pdfPageNum >= currentPdf.numPages);

            } catch (error) {
                if(error.name !== 'RenderingCancelledException') console.error(error);
            }
        }

        function initManualControls() {
            document.getElementById('btn-prev-page').onclick = () => {
                if (pdfPageNum > 1) { pdfPageNum--; renderPdfPage(); viewerContainer.scrollTop = 0; viewerContainer.scrollLeft = 0; }
            };
            document.getElementById('btn-next-page').onclick = () => {
                if (pdfPageNum < currentPdf.numPages) { pdfPageNum++; renderPdfPage(); viewerContainer.scrollTop = 0; viewerContainer.scrollLeft = 0; }
            };

            document.getElementById('btn-zoom-in').onclick = () => {
                if (pdfScale < 4.0) { pdfScale += 0.2; renderPdfPage(); }
            };
            document.getElementById('btn-zoom-out').onclick = () => {
                if (pdfScale > 0.5) { pdfScale -= 0.2; renderPdfPage(); }
            };
        }
